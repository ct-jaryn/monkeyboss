<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonkeyBoss - 控制面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
      --border: #2e3348; --text: #e4e6f0; --text2: #8b8fa8;
      --primary: #6c5ce7; --primary-light: #a29bfe;
      --green: #00b894; --red: #e17055; --yellow: #fdcb6e;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header h1 span { color: var(--primary-light); }
    .header .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge-idle { background: var(--surface2); color: var(--text2); }
    .badge-running { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge-completed { background: rgba(108,92,231,0.15); color: var(--primary-light); }
    .badge-failed { background: rgba(225,112,85,0.15); color: var(--red); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { opacity: 0.85; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-group { display: flex; gap: 10px; margin-top: 16px; }
    .log-container { background: #0a0c10; border: 1px solid var(--border); border-radius: 8px; padding: 14px; height: 320px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.7; }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-info { color: var(--text2); }
    .log-warn { color: var(--yellow); }
    .log-error { color: var(--red); }
    .log-success { color: var(--green); }
    .progress-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width 0.5s ease; }
    .timeline { margin-top: 12px; }
    .timeline-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .timeline-text { font-size: 13px; color: var(--text2); }
    .timeline-time { font-size: 11px; color: var(--text2); opacity: 0.6; margin-left: auto; white-space: nowrap; }
    .module-flow { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 10px 0; }
    .module-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 12px; text-align: center; min-width: 100px; }
    .module-box.active { border-color: var(--primary); background: rgba(108,92,231,0.1); }
    .module-arrow { color: var(--text2); font-size: 18px; }
    @media (max-width: 768px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Monkey<span>Boss</span> 控制面板</h1>
    <span id="statusBadge" class="status-badge badge-idle">空闲</span>
  </div>

  <div class="container">
    <div class="grid-3">
      <div class="card">
        <h3>迭代次数</h3>
        <div class="stat-value" id="statIterations">0</div>
        <div class="stat-label">/ <span id="statMaxIterations">1000</span> 上限</div>
        <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
      </div>
      <div class="card">
        <h3>运行时长</h3>
        <div class="stat-value" id="statRuntime">00:00:00</div>
        <div class="stat-label" id="statStartedAt">尚未启动</div>
      </div>
      <div class="card">
        <h3>错误统计</h3>
        <div class="stat-value" id="statErrors" style="color:var(--green)">0</div>
        <div class="stat-label" id="statLastError">暂无错误</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <h3>架构流程</h3>
      <div class="module-flow">
        <div class="module-box" id="mod-browser">浏览器<br><small>隐私模式</small></div>
        <div class="module-arrow">-></div>
        <div class="module-box" id="mod-auth">认证<br><small>账号登录</small></div>
        <div class="module-arrow">-></div>
        <div class="module-box" id="mod-scraper">采集器<br><small>页面数据</small></div>
        <div class="module-arrow">-></div>
        <div class="module-box" id="mod-ai">AI 决策<br><small>智能分析</small></div>
        <div class="module-arrow">-></div>
        <div class="module-box" id="mod-executor">执行器<br><small>操作执行</small></div>
        <div class="module-arrow">-></div>
        <div class="module-box" id="mod-engine">引擎<br><small>7x24 循环</small></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>任务配置</h3>
        <div class="form-group">
          <label>MonkeyCode 地址</label>
          <input type="text" id="cfgUrl" value="https://monkeycode.ai" />
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="cfgUsername" placeholder="MonkeyCode 账号" />
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="cfgPassword" placeholder="MonkeyCode 密码" />
        </div>
        <div class="form-group">
          <label>AI 服务商</label>
          <select id="cfgProvider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="form-group">
          <label>AI API 密钥</label>
          <input type="password" id="cfgApiKey" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label>AI 模型</label>
          <input type="text" id="cfgModel" value="gpt-4o" />
        </div>
        <div class="form-group">
          <label>项目名称</label>
          <input type="text" id="cfgProject" placeholder="我的项目" />
        </div>
        <div class="form-group">
          <label>任务描述</label>
          <textarea id="cfgDescription" placeholder="描述你希望 MonkeyCode 开发的内容..."></textarea>
        </div>
        <div class="form-group">
          <label>最大迭代次数</label>
          <input type="number" id="cfgMaxIter" value="1000" />
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
          <button class="btn btn-primary" onclick="startTask()">启动任务</button>
          <button class="btn btn-danger" onclick="stopTask()">停止</button>
        </div>
      </div>

      <div class="card">
        <h3>实时日志</h3>
        <div class="log-container" id="logContainer"></div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="clearLogs()">清空</button>
          <button class="btn btn-secondary" onclick="refreshStatus()">刷新</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>活动时间线</h3>
      <div class="timeline" id="timeline">
        <div class="timeline-item">
          <div class="timeline-dot" style="background:var(--text2)"></div>
          <div class="timeline-text">系统就绪，请配置并启动任务。</div>
          <div class="timeline-time">现在</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const STATUS_MAP = { idle: '空闲', running: '运行中', completed: '已完成', failed: '已失败', paused: '已暂停' };
    let pollTimer = null;

    function addLog(msg, level = 'info') {
      const container = document.getElementById('logContainer');
      const line = document.createElement('div');
      line.className = `log-line log-${level}`;
      const ts = new Date().toLocaleTimeString();
      line.textContent = `[${ts}] ${msg}`;
      container.appendChild(line);
      container.scrollTop = container.scrollHeight;
    }

    function addTimeline(text, color = 'var(--text2)') {
      const timeline = document.getElementById('timeline');
      const item = document.createElement('div');
      item.className = 'timeline-item';
      item.innerHTML = `
        <div class="timeline-dot" style="background:${color}"></div>
        <div class="timeline-text">${text}</div>
        <div class="timeline-time">${new Date().toLocaleTimeString()}</div>
      `;
      timeline.prepend(item);
    }

    function updateBadge(status) {
      const badge = document.getElementById('statusBadge');
      badge.textContent = STATUS_MAP[status] || status.toUpperCase();
      badge.className = 'status-badge badge-' + (status === 'running' ? 'running' : status === 'completed' ? 'completed' : status === 'failed' ? 'failed' : 'idle');
    }

    function highlightModule(name) {
      document.querySelectorAll('.module-box').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('mod-' + name);
      if (el) el.classList.add('active');
    }

    async function saveConfig() {
      const config = {
        monkeycode: {
          url: document.getElementById('cfgUrl').value,
          username: document.getElementById('cfgUsername').value,
          password: document.getElementById('cfgPassword').value,
        },
        ai: {
          provider: document.getElementById('cfgProvider').value,
          apiKey: document.getElementById('cfgApiKey').value,
          model: document.getElementById('cfgModel').value,
        },
        task: {
          projectName: document.getElementById('cfgProject').value,
          description: document.getElementById('cfgDescription').value,
          maxIterations: parseInt(document.getElementById('cfgMaxIter').value),
        },
      };
      try {
        const res = await fetch(`${API}/config`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config),
        });
        const data = await res.json();
        addLog('配置已保存', 'success');
        addTimeline('配置已更新', 'var(--primary-light)');
      } catch (e) {
        addLog('保存配置失败: ' + e.message, 'error');
      }
    }

    async function startTask() {
      try {
        await saveConfig();
        const res = await fetch(`${API}/task/start`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          addLog('任务已启动', 'success');
          addTimeline('任务已启动', 'var(--green)');
          updateBadge('running');
          startPolling();
        } else {
          addLog('启动失败: ' + data.error, 'error');
        }
      } catch (e) {
        addLog('启动失败: ' + e.message, 'error');
      }
    }

    async function stopTask() {
      try {
        const res = await fetch(`${API}/task/stop`, { method: 'POST' });
        const data = await res.json();
        addLog('任务已停止', 'warn');
        addTimeline('用户手动停止任务', 'var(--red)');
        updateBadge('idle');
        stopPolling();
      } catch (e) {
        addLog('停止失败: ' + e.message, 'error');
      }
    }

    async function refreshStatus() {
      try {
        const res = await fetch(`${API}/status`);
        const data = await res.json();
        document.getElementById('statIterations').textContent = data.iteration || 0;
        document.getElementById('statMaxIterations').textContent = data.maxIterations || 1000;
        const pct = data.maxIterations ? ((data.iteration / data.maxIterations) * 100).toFixed(1) : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('statErrors').textContent = data.errorCount || 0;
        document.getElementById('statErrors').style.color = (data.errorCount > 0) ? 'var(--red)' : 'var(--green)';
        document.getElementById('statLastError').textContent = data.lastError || '暂无错误';
        updateBadge(data.status || 'idle');

        if (data.startedAt) {
          const elapsed = Date.now() - new Date(data.startedAt).getTime();
          const h = String(Math.floor(elapsed / 3600000)).padStart(2, '0');
          const m = String(Math.floor((elapsed % 3600000) / 60000)).padStart(2, '0');
          const s = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
          document.getElementById('statRuntime').textContent = `${h}:${m}:${s}`;
          document.getElementById('statStartedAt').textContent = '启动于: ' + new Date(data.startedAt).toLocaleString();
        }

        if (data.activeModule) highlightModule(data.activeModule);
        if (data.statusSummary) {
          document.getElementById('statLastError').textContent = data.statusSummary;
        }
      } catch (e) { /* silent */ }
    }

    async function fetchLogs() {
      try {
        const res = await fetch(`${API}/logs`);
        const data = await res.json();
        if (data.logs && data.logs.length > 0) {
          data.logs.forEach(log => {
            const level = log.includes('ERROR') ? 'error' : log.includes('WARN') ? 'warn' : log.includes('SUCCESS') ? 'success' : 'info';
            const container = document.getElementById('logContainer');
            const line = document.createElement('div');
            line.className = `log-line log-${level}`;
            line.textContent = log;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
          });
        }
      } catch (e) { /* silent */ }
    }

    function clearLogs() {
      document.getElementById('logContainer').innerHTML = '';
      addLog('日志已清空', 'info');
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => { refreshStatus(); fetchLogs(); }, 3000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    refreshStatus();
    addLog('MonkeyBoss 控制面板已加载', 'success');
  </script>
</body>
</html>
